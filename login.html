<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio de Sesión - Control de Vacaciones</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/x-icon" href="dbicon.png" />
</head>
<body data-page="login">

  <!-- Login
       ===================================================== -->
  <main class="loginContainer">
    <section class="loginWrapper">

      <!-- Inicio de sesión -->
      <form id="form-login" class="loginForm">
        <h1>Iniciar sesión</h1>
        <div id="mensaje-login"></div>

        <!-- Usuario -->
        <div class="loginInputBox">
          <label for="username">Usuario</label>
          <input
            id="username"
            type="text"
            placeholder="Nombre de Usuario"
            autocomplete="username"
          />
        </div>

        <!-- Contraseña -->
        <div class="loginInputBox">
          <label for="password">Contraseña</label>
          <input
            id="password"
            type="password"
            placeholder="Contraseña"
            autocomplete="current-password"
          />
        </div>

        <!-- Botón login -->
        <button id="btn-login" type="submit" class="btn btnPrimario btnLogin">
          Ingresar
        </button>

        <!-- Usuario de prueba -->
        <p class="ayudaLogin">
          Usuarios dummy: <strong>admin</strong> / <strong>123</strong>
        </p>
      </form>
    </section>
  </main>
  <script src="javascript/dummy.js"></script>
  <script src="javascript/utils.js"></script>
  <script src="javascript/login.js"></script>
  <script src="javascript/empleados.js"></script>
  <script src="javascript/movimientos.js"></script>
  <script src="javascript/app.js"></script>
</body>
</html>
