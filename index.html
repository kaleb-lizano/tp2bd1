<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Vacaciones</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/x-icon" href="dbicon.png" />
</head>
<body data-page="app">
  <main class="layoutPrincipal">

    <!-- Página principal
         ===================================================== -->
    <section id="vista-principal" class="contenedorVista">

      <!-- Encabezado -->
      <div class="encabezadoPrincipal encabezadoConAcciones">
        <div>
          <h1>Empleados</h1>
          <p class="subtituloVista">
            Placeholder
          </p>
          <p id="usuario-activo" class="usuarioActivo"></p>
        </div>

        <!-- Acciones principales -->
        <div class="accionesFiltro">
          <button id="btn-mostrar-formulario" class="btn btnPrimario" type="button">
            Insertar empleado
          </button>
          <button id="btn-logout" class="btn btnSecundario" type="button">
            Cerrar sesión
          </button>
        </div>
      </div>

      <div id="mensaje-principal"></div>

      <!-- Filtros -->
      <div class="barraFiltros">
        <div class="campoFiltro">
          <label for="filtro-empleado">Buscar por nombre o documento</label>
          <input
            type="text"
            id="filtro-empleado"
            placeholder="Nombre / Documento"
            autocomplete="off"
          />
        </div>

        <div class="accionesFiltro">
          <button id="btn-filtrar" class="btn btnPrimario" type="button">
            Filtrar
          </button>
          <button id="btn-limpiar-filtro" class="btn btnSecundario" type="button">
            Limpiar
          </button>
        </div>
      </div>

      <!-- Tabla Empleados -->
      <div class="contenedorTabla">
        <table>
          <thead>
            <tr>
              <th>Documento</th>
              <th>Nombre</th>
              <th>Puesto</th>
              <th>Saldo vacaciones</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-empleados"></tbody>
        </table>
      </div>
    </section>

    <!-- Insertar o editar empleado
         ===================================================== -->
    <section id="vista-formulario" class="contenedorVista oculto">
      <div class="encabezadoPrincipal">
        <h2 id="titulo-formulario">Insertar empleado</h2>
        <p class="subtituloVista">
          placeholder
        </p>
      </div>

      <div id="mensaje-formulario"></div>

      <form id="form-empleado" class="formulario">
        <input type="hidden" id="idEmpleadoEditar" />

        <!-- Documento -->
        <div class="grupoCampo">
          <label for="valorDocumentoIdentidad">Documento de identidad</label>
          <input
            type="text"
            id="valorDocumentoIdentidad"
            name="valorDocumentoIdentidad"
            placeholder="Ingrese el documento"
            autocomplete="off"
          />
        </div>

        <!-- Nombre -->
        <div class="grupoCampo">
          <label for="nombreEmpleado">Nombre completo</label>
          <input
            type="text"
            id="nombreEmpleado"
            name="nombreEmpleado"
            placeholder="Ingrese el nombre completo"
            autocomplete="off"
          />
        </div>

        <!-- Puesto -->
        <div class="grupoCampo">
          <label for="puestoEmpleado">Puesto</label>
          <select id="puestoEmpleado" name="puestoEmpleado"></select>
        </div>

        <!-- Botones -->
        <div class="accionesFormulario">
          <button type="submit" class="btn btnPrimario">Guardar</button>
          <button type="button" id="btn-cancelar-formulario" class="btn btnSecundario">
            Cancelar
          </button>
        </div>
      </form>
    </section>

    <!-- Listar movimientos
         ===================================================== -->
    <section id="vista-movimientos" class="contenedorVista oculto">
      <div class="encabezadoPrincipal encabezadoConAcciones">
        <div>
          <h2>Movimientos de vacaciones</h2>
          <p id="resumen-empleado-movimientos" class="subtituloVista"></p>
        </div>

        <div class="accionesFiltro">
          <button id="btn-mostrar-movimiento" class="btn btnPrimario" type="button">
            Insertar movimiento
          </button>
          <button id="btn-volver-desde-movimientos" class="btn btnSecundario" type="button">
            Volver
          </button>
        </div>
      </div>

      <div id="mensaje-movimientos"></div>

      <!-- Tabla Movimientos -->
      <div class="contenedorTabla">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Monto</th>
              <th>Nuevo saldo</th>
              <th>Usuario</th>
              <th>IP</th>
              <th>PostTime</th>
            </tr>
          </thead>
          <tbody id="tabla-movimientos"></tbody>
        </table>
      </div>
    </section>

    <!-- Insertar movimiento
         ===================================================== -->
    <section id="vista-formulario-movimiento" class="contenedorVista oculto">
      <div class="encabezadoPrincipal">
        <h2>Insertar movimiento</h2>
        <p id="resumen-empleado-form-movimiento" class="subtituloVista"></p>
      </div>

      <div id="mensaje-formulario-movimiento"></div>

      <form id="form-movimiento" class="formulario">

        <!-- Tipo de movimiento -->
        <div class="grupoCampo">
          <label for="tipoMovimiento">Tipo de movimiento</label>
          <select id="tipoMovimiento"></select>
        </div>

        <!-- Monto -->
        <div class="grupoCampo">
          <label for="montoMovimiento">Monto</label>
          <input
            type="number"
            id="montoMovimiento"
            min="1"
            step="1"
            placeholder="Ej: 2"
          />
        </div>

        <!-- Botones -->
        <div class="accionesFormulario">
          <button type="submit" class="btn btnPrimario">Guardar movimiento</button>
          <button type="button" id="btn-cancelar-movimiento" class="btn btnSecundario">
            Cancelar
          </button>
        </div>
      </form>
    </section>
  </main>

  <!-- Modal Consulta Empleado
       ===================================================== -->
  <div id="modal-detalle" class="modal oculto" role="dialog" aria-modal="true">
    <div class="modalContenido">
      <h2>Consulta de empleado</h2>
      <div id="detalle-empleado"></div>
      <button id="btn-cerrar-modal" class="btn btnPrimario" type="button">
        Cerrar
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
